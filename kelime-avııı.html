<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avı - Eğlenceli Kelime Tahmin Oyunu</title>
    <link rel="stylesheet" href="kelime-avi.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Kelime Avı 🎮</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="selectMode('single', event)">👤 Tek Oyuncu</button>
            <button class="mode-btn" onclick="selectMode('group', event)">👥 Grup Oyunu</button>
        </div>

        <!-- Tek Oyuncu Modu -->
        <div id="singleMode" class="game-area active">
            <div class="hint" id="hint">İpucu: Hayvanlar aleminin kralı 🦁</div>
            <div class="word-display" id="wordDisplay">_ _ _ _</div>

            <!-- Zamanlayıcı -->
            <div class="timer-bar">
                <span class="timer-icon">⏱️</span>
                <div class="timer-track">
                    <div class="timer-fill" id="timerFill"></div>
                </div>
                <span class="timer-text" id="timerText">60</span>
            </div>
            
            <div class="input-group">
                <input type="text" id="letterInput" maxlength="1" placeholder="Harf (İ,Ş,Ğ...)" autocomplete="off">
                <button class="btn" onclick="guessLetter()">Tahmin Et</button>
            </div>
            
            <div class="score-board">
                <div>Puan: <span id="score">0</span></div>
                <div>Deneme: <span id="attempts">10</span></div>
                <div>Doğru: <span id="correct">0</span></div>
                <div>Seviye: <span id="level">Kolay</span></div>
            </div>

            <div class="guessed-label">Denenen harfler:</div>
            <div class="guessed-letters" id="guessedLettersDisplay"></div>
            
            <div class="message" id="message"></div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
                <button class="btn" onclick="newGame()">🆕 Yeni Oyun</button>
                <button class="btn" onclick="openLeaderboard()" style="background:rgba(255,255,255,0.2);">🏆 Skor Tablosu</button>
            </div>
        </div>

        <!-- Grup Modu -->
        <div id="groupMode" class="game-area group-mode">
            <div class="hint" id="groupHint">İpucu: Başkent şehri 🏛️</div>
            <div class="word-display" id="groupWordDisplay">_ _ _ _ _ _ _</div>
            
            <div class="player-names">
                <span>Oyuncular:</span>
                <input type="text" id="player1Name" placeholder="Oyuncu 1" maxlength="10">
                <input type="text" id="player2Name" placeholder="Oyuncu 2" maxlength="10">
                <input type="text" id="player3Name" placeholder="Oyuncu 3" maxlength="10">
            </div>
            
            <div class="players-container" id="playersContainer"></div>
            
            <div class="input-group">
                <input type="text" id="groupLetterInput" maxlength="1" placeholder="Harf (İ,Ş,Ğ...)" autocomplete="off">
                <button id="groupGuessBtn" class="btn" onclick="groupGuessLetter()">Tahmin Et</button>
            </div>

            <div class="guessed-label">Bu turda denenen harfler:</div>
            <div class="guessed-letters" id="groupGuessedLettersDisplay"></div>
            
            <div class="message" id="groupMessage"></div>
            <button class="btn" onclick="newGroupGame()">🆕 Yeni Grup Oyunu</button>
        </div>
    </div>

    <!-- Grup skor özeti modal -->
    <div class="score-modal-overlay" id="scoreModalOverlay">
        <div class="score-modal">
            <h2 id="modalTitle">🏆 Tur Bitti!</h2>
            <div class="winner-name" id="modalWinner"></div>
            <div class="modal-scores" id="modalScores"></div>
            <button class="btn" onclick="closeScoreModal()">🆕 Yeni Oyun</button>
        </div>
    </div>

    <!-- Skor geçmişi / leaderboard modal -->
    <div class="lb-modal-overlay" id="lbModalOverlay">
        <div class="lb-modal">
            <h2>🏆 Skor Tablosu</h2>
            <div id="lbContent"></div>
            <div class="lb-actions">
                <button class="btn" onclick="closeLb()">Kapat</button>
                <button class="btn-ghost" onclick="clearLeaderboard()">🗑️ Sıfırla</button>
            </div>
        </div>
    </div>

    <script src="kelime-avi.js"></script>
</body>
</html>
